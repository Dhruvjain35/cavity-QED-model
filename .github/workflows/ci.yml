name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run cargo tests
        run: cargo test --manifest-path wasm/Cargo.toml

  web:
    name: WASM build + Node validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM (web target)
        run: wasm-pack build wasm --target web --out-dir pkg-web --out-name cqed_core

      - name: Build WASM (nodejs target)
        run: wasm-pack build wasm --target nodejs --out-dir pkg --out-name cqed_core

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Node WASM-boundary validation
        run: node wasm/validate_wasm.cjs
